name: Bug Report
description: Something is not working as expected
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it helps a lot.

        > **Security issue?** Do not use this form. See [SECURITY.md](../SECURITY.md) for the private reporting process.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click "Start" on the simulator, the app crashes with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The simulation should start and show a live position on the map.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Open the GPS Simulator page
        2. Select a RINEX file
        3. Click Start
        4. ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: e.g. Windows 11 24H2, Ubuntu 24.04, macOS 15.3
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version or commit
      placeholder: e.g. v0.1.0 or git commit abc1234
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: SDR output used
      options:
        - HackRF One
        - IQ File
        - UDP stream
        - TCP server
        - Null (no output)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Run with `RUST_LOG=debug cargo run` and paste relevant output here.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, related issues, or additional context.

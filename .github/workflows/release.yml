name: Release

# Runs when you push a version tag, e.g.: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create a GitHub Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gui_sdr_gps_sim.exe
            archive: gui_sdr_gps_sim-windows-x86_64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gui_sdr_gps_sim
            archive: gui_sdr_gps_sim-linux-x86_64.tar.gz

          - os: macos-13          # Intel runner
            target: x86_64-apple-darwin
            binary: gui_sdr_gps_sim
            archive: gui_sdr_gps_sim-macos-x86_64.tar.gz

          - os: macos-latest      # Apple Silicon runner
            target: aarch64-apple-darwin
            binary: gui_sdr_gps_sim
            archive: gui_sdr_gps_sim-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libudev-dev libgtk-3-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ matrix.binary }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" \
            "${{ matrix.binary }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
